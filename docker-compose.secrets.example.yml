version: '3.8'
services:
  db:
    environment:
      POSTGRES_DB: bookmarks
      POSTGRES_USER: bookmarks
    secrets:
      - postgres_password

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

# usage: create './secrets/postgres_password.txt' with the password and
# run: docker compose -f docker-compose.yml -f docker-compose.secrets.example.yml up -d
