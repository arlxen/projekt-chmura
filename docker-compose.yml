services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookmarks}
      POSTGRES_USER: ${POSTGRES_USER:-bookmarks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookmarks}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookmarks} -d ${POSTGRES_DB:-bookmarks}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_DSN: postgresql+psycopg2://${POSTGRES_USER:-bookmarks}:${POSTGRES_PASSWORD:-bookmarks}@db:5432/${POSTGRES_DB:-bookmarks}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      POSTGRES_DSN: postgresql+psycopg2://${POSTGRES_USER:-bookmarks}:${POSTGRES_PASSWORD:-bookmarks}@db:5432/${POSTGRES_DB:-bookmarks}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - public
      - internal

volumes:
  postgres_data:

networks:
  public:
  internal:
    internal: true
